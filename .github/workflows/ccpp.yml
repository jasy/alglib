name: Algorithm libraries for programming contest CI

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - cxx: g++
            coverage: true
          - cxx: clang++
            coverage: false

    env:
      CXX: ${{ matrix.cxx }}
      COV: ${{ matrix.coverage == 'true' && 'ON' || 'OFF' }}

    steps:
      - &checkout_step
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Configure
        run: cmake -S . -B build -DCMAKE_CXX_COMPILER=${{ env.CXX }} -DENABLE_COVERAGE=${{ env.COV }}

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Generate coverage report
        if: matrix.coverage == 'true'
        run: |
          python3 -m pip install --upgrade gcovr
          mkdir -p coverage
          python3 -m gcovr -r . --object-directory build --exclude googletest --html --html-details -o coverage/index.html
          echo "Coverage directory listing:";
          ls -la coverage || true

      - name: Upload coverage report
        if: matrix.coverage == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage
