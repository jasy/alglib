name: C++ CI

on: [push, workflow_dispatch]

jobs:
  build:

    runs-on: ubuntu-latest
    
    strategy:    
      matrix:
        cxx: [g++, clang++]

    steps:
    - uses: actions/checkout@v7
      with:
        submodules: recursive
    - name: Build and Run test
      run: ${CXX} --version && make test
      env:
        CXX: ${{ matrix.cxx }}
