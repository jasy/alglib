name: Algorithm libraries for programming contest CI

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
        cxx: [g++, clang++]

    env:
      coverage: ${{ matrix.cxx == 'g++' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Configure
        run: cmake -S . -B build -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} -DENABLE_COVERAGE=${{ env.coverage && 'ON' || 'OFF' }}

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Generate coverage report
        if: env.coverage
        run: |
          python3 -m pip install --upgrade gcovr
          mkdir -p coverage
          python3 -m gcovr -r . --object-directory build --exclude googletest --html --html-details -o coverage/index.html
          echo "Coverage directory listing:";
          ls -la coverage || true

      - name: Upload coverage report
        if: env.coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-${{ matrix.os }}-${{ matrix.cxx }}
          path: coverage
